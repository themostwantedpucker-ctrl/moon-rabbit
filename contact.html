/* LABELS */
.wpforms-form label {
    color: #ffffff !important;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px !important;
}

/* INPUTS (DARKER GLASS) */
.wpforms-form input,
.wpforms-form textarea,
.wpforms-form select {

    /* darker than before for contrast */
    background: rgba(0,0,0,0.40) !important;

    border: 1px solid rgba(255,255,255,0.20) !important;

    border-radius: 14px !important;

    padding: 18px 20px !important;

    color: #ffffff !important;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    font-weight: 500;

    transition: all 0.3s ease;
}

/* PLACEHOLDER */
.wpforms-form input::placeholder,
.wpforms-form textarea::placeholder {
    color: rgba(255,255,255,0.65) !important;
    opacity: 1 !important;
}

/* HOVER */
.wpforms-form input:hover,
.wpforms-form textarea:hover,
.wpforms-form select:hover {
    background: rgba(0,0,0,0.48) !important;
    border-color: rgba(255,255,255,0.30) !important;
}

/* FOCUS */
.wpforms-form input:focus,
.wpforms-form textarea:focus,
.wpforms-form select:focus {
    outline: none !important;
    background: rgba(0,0,0,0.55) !important;
    border-color: #ffffff !important;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.10);
}

/* TEXTAREA */
.wpforms-form textarea {
    min-height: 160px;
}

/* BUTTON */
.wpforms-submit {
    width: 100%;
    background: #ffffff !important;
    color: #000 !important;
    border: none !important;
    border-radius: 14px !important;
    padding: 18px 24px !important;
    font-weight: 700 !important;
}

/* MOBILE */
@media (max-width: 768px) {

.wpforms-form input,
.wpforms-form textarea,
.wpforms-form select {
    padding: 16px !important;
}

}

/* Start custom CSS for container, class: .elementor-element-4c3f005 *//* =========================
   ULTRA LIGHT GLASS
========================= */

.premium-glass{

    position: relative;
    overflow: hidden;

    padding: 60px;

    border-radius: 28px;

    /* almost invisible glass */
    background: rgba(255,255,255,.025);

    backdrop-filter:
        blur(6px)
        brightness(1.08)
        saturate(110%);

    -webkit-backdrop-filter:
        blur(6px)
        brightness(1.08)
        saturate(110%);

    border: 1px solid rgba(255,255,255,.08);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 8px 25px rgba(0,0,0,.04);

    isolation: isolate;
}

/* very soft reflection */
.premium-glass::before{

    content:"";

    position:absolute;

    inset:0;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.10),
            rgba(255,255,255,.03) 30%,
            transparent 65%
        );

    pointer-events:none;
}

/* tiny highlight only */
.premium-glass::after{

    content:"";

    position:absolute;

    top:-80px;
    right:-80px;

    width:200px;
    height:200px;

    background:
        radial-gradient(
            circle,
            rgba(255,255,255,.08),
            transparent 70%
        );

    filter: blur(18px);

    pointer-events:none;
}

/* keep content above */
.premium-glass > *{
    position:relative;
    z-index:2;
}

/* WPForms reset */
.premium-glass .wpforms-container-full{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
}

@media(max-width:768px){

.premium-glass{
padding:28px 18px;
}
